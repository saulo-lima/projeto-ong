<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG: front-end</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="https://kit.fontawesome.com/dbdc8aa0f7.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="content">

        <aside>
            <img src="imagens/hero.svg" alt="Ilustração de mulher brincando com cachorro">
            <h1><span class="destaque">We</span> Form</h1>
        </aside>
        <main>
            <header>
                <a href="index.html"><i class="fa-solid fa-angle-left"></i></a>
                <h2>
                    Nova <span class="destaque">entidade</span>
                </h2>
            </header>
            <div class="action">
                
                <form action="" method="post">
                    <label for="nome-id">Nome</label>
                    <input type="text" name="nome" id="nome-id">
                    
                    <label for="campo-id">Campo de atuação</label>
                    <select name="campo" id="campo-id">
                         <option value="selecione" disabled selected>---Selecione uma opção---</option>
                        <option value="cachorro">Abrigo de cachorro</option>
                        <option value="gato">Abrigo de gato</option>
                        <option value="cavalo">Abrigo de cavalo</option>
                    </select>
                     <label for="coleta-id">Ponto de Coleta</label>
                    <div class="point">
                       
                        <input type="text" name="coleta" id="coleta-id">
                        <button><i class="fa-solid fa-circle-plus"></i></button>
                    </div>
                </form>

                <a href="" class="btn ">Cadastrar </a>
                
            </div>


           
        </main>
    
    </div>
</body>
</html>
